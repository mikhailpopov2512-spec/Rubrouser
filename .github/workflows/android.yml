name: Android CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build & Test Rosbrowser
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Codebase
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    - name: Decode Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
          echo "debug.keystore decoded successfully."
        else
          echo "debug.keystore.base64 not found!"
        fi

    - name: Run Room KSP Code Generation and Compile Check
      run: gradle compileDebugKotlin --no-daemon

    - name: Execute Local JVM Unit and Robolectric Tests
      run: gradle :app:testDebugUnitTest --no-daemon

    - name: Assemble Debug APK Binaries
      run: gradle :app:assembleDebug --no-daemon
